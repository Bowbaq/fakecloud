# cargo-audit configuration
#
# The ignored advisories below all flag rustls-webpki 0.101.7, which
# ships transitively via aws-smithy-http-client 1.1.12 ->
# hyper-rustls 0.24 -> rustls 0.21 -> rustls-webpki 0.101.7. The fix
# (>= 0.103.12) is only available on the rustls 0.103 branch; the
# legacy rustls 0.21 tree consumed by aws-smithy-http-client has no
# backport and aws-smithy-http-client has no newer release that drops
# it. Our own rustls-webpki (0.103.x) is already updated to 0.103.12
# so the vulnerable code paths are only reachable through the AWS SDK
# client stack we don't control.
#
# Revisit when aws-smithy-http-client publishes a release that moves
# off rustls 0.21.

[advisories]
ignore = [
    "RUSTSEC-2026-0098", # rustls-webpki 0.101.7 (via aws-smithy-http-client legacy rustls 0.21 tree)
    "RUSTSEC-2026-0099", # rustls-webpki 0.101.7 (via aws-smithy-http-client legacy rustls 0.21 tree)
]
